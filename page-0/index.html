<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Language</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="splash-screen">
        <div class="splash-content">
            <h1>💡 Best Experience on Chrome</h1>
            <p>แนะนำให้เล่นผ่าน Google Chrome<br>เพื่อการแสดงผลที่สมบูรณ์ที่สุด</p>
        </div>
    </div>
    <div id="game-backdrop"></div>
    <div id="scale-wrapper">
        <div class="app-container">
            <div class="selection-box pop-in" id="mainBox">
                <h2 class="title">Select Language<br><span>เลือกภาษาของคุณ</span></h2>
                <div class="btn-group">
                    <button class="lang-btn" data-lang="th">ภาษาไทย</button>
                    <button class="lang-btn" data-lang="en">English</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../sound-bridge.js"></script>
    <script src="script.js"></script>
</body>

</html>
